services:
  # ── Next.js Web Service ──────────────────────────────────────────────────────
  - type: web
    name: trade-analyst
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    # Starter plan required — Free tier sleeps and breaks cron reliability.
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FLEX_TOKEN_ENCRYPTION_KEY
        sync: false          # 64-char hex (32 bytes) — generate with: openssl rand -hex 32
      - key: MASSIVE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false          # random string — used to authenticate cron job requests

  # ── Cron Job: IBKR Activity Flex polling ────────────────────────────────────
  # Fires twice daily at 13:00 & 20:00 UTC (16:00 & 23:00 IST standard time).
  # 13:00 UTC = 09:00 AM EDT — IBKR Flex data is reliably available by this time.
  # 20:00 UTC = 16:00 PM EDT — post-market, catches same-day EOD data.
  # Previous schedule (08:00 UTC = 03:00 AM EDT) caused IBKR error 1001 ("report not ready").
  - type: cron
    name: ibkr-sync
    runtime: image
    schedule: "0 13,20 * * *"
    image:
      url: docker.io/curlimages/curl:8.7.1
    command: >
      curl --silent --show-error --fail
      --header "Authorization: Bearer $CRON_SECRET"
      "$RENDER_EXTERNAL_URL/api/cron/ibkr-sync"
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false          # e.g. https://trade-analyst.onrender.com

  # ── Cron Job: Massive price updates ─────────────────────────────────────────
  # DASHBOARD-FUTURE: disabled until live-dashboard feature is released.
  # To re-enable: uncomment the block below and set MASSIVE_API_KEY in Render dashboard.
