name: AI Import Worker

# Processes queued AI-Excel-import jobs off-Vercel (Gemini cascade can exceed
# the Hobby 60s function limit). Triggered on-demand by the upload route via
# repository_dispatch (AI_IMPORT_DISPATCH_TOKEN/REPO configured in Vercel) —
# that's the primary path, so uploads are processed within seconds. The
# schedule below is only the safety net for a silently-failed dispatch (PAT
# revoked/expired, rate limit, network blip) — worst case a job waits up to
# 30 min instead of being stuck forever. Kept infrequent to save Actions
# minutes since dispatch already handles the common case.
on:
  repository_dispatch:
    types: [ai-import-requested]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

# Never run two drains at once — the second would just find an empty queue (or
# contend on claims). Let an in-flight run finish rather than cancelling it.
concurrency:
  group: ai-import-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Process AI import queue
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/process-ai-import-queue.ts
